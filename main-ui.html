<!-- 全屏竖向容器：状态栏 + 页面内容，随 body 壁纸显示 -->
<div id="screen-wrap">

  <!-- 顶部状态栏（普通流，不再 fixed，随壁纸显示） -->
  <div id="status-bar">
    <div id="status-time">00:00</div>
    <div id="status-watermark">MX_4</div>
  </div>

  <!-- 页面横滑容器 -->
  <div id="pages-wrap">
    <div class="page" id="page1">
      <div id="page1-inner">
        <div id="date-capsule">
          <div id="date-left">
            <div id="date-year-month"></div>
            <div id="date-day"></div>
            <div id="date-lunar"></div>
          </div>
          <div class="cd-divider"></div>
          <div id="countdown-right">
            <div id="cd-label">加载中…</div>
            <div id="cd-number">—</div>
            <div id="cd-unit">天</div>
          </div>
        </div>

        <div id="msg-widget">
          <div class="msg-row">
            <img class="msg-avatar" id="msg-avatar-0" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=luna" alt="">
            <div class="msg-bubbles" id="msg-bubbles-0">
              <div class="msg-bubble">你好呀，今天过得怎么样？</div>
            </div>
          </div>
          <div class="msg-row">
            <img class="msg-avatar" id="msg-avatar-1" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=nova" alt="">
            <div class="msg-bubbles" id="msg-bubbles-1">
              <div class="msg-bubble">HALO·九 已上线</div>
            </div>
          </div>
        </div>

        <div id="mid-row">
          <div id="left-col">
            <div id="user-card">
              <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=halo9" alt="头像">
              <div id="user-sig"></div>
            </div>
            <div id="four-apps">
              <div class="app-item" data-app="0">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/music.png" alt="">
                <div class="app-name">音乐</div>
              </div>
              <div class="app-item" data-app="worldbook">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/book-reading.png" alt="">
              <div class="app-name">世界书</div>
              </div>
              <div class="app-item" data-app="2">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/calendar--v1.png" alt="">
                <div class="app-name">日历</div>
              </div>
              <div class="app-item" data-app="3">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/gallery.png" alt="">
                <div class="app-name">相册</div>
              </div>
            </div>
          </div>

          <div id="right-col">
            <div id="two-apps">
              <div class="app-item" data-app="chat">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/chat.png" alt="">
                <div class="app-name">了了</div>
              </div>
              <div class="app-item" data-app="settings">
                <img class="app-icon" src="https://img.icons8.com/fluency/96/settings.png" alt="">
                <div class="app-name">设置</div>
              </div>
            </div>
            <div id="carousel-widget">
              <img id="carousel-img" src="" alt="" style="opacity:0;">
              <div id="carousel-placeholder">
                <div class="plus-icon">+</div>
                <div>点击添加图片</div>
              </div>
            </div>
            <div id="text-bars">
              <div class="text-bar" id="text-bar-0">
                <span class="text-bar-content" id="text-bar-content-0" data-bar="0"></span>
                <span class="text-bar-placeholder" id="text-bar-placeholder-0">点击写点什么…</span>
              </div>
              <div class="text-bar text-bar-offset" id="text-bar-1">
                <span class="text-bar-content" id="text-bar-content-1" data-bar="1"></span>
                <span class="text-bar-placeholder" id="text-bar-placeholder-1">再写一行…</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page2">
      <div id="page2-inner">
        <div class="p2-icon">◐</div>
        <div>第二页</div>
        <div style="font-size:11px;margin-top:4px;opacity:.7;">向左滑动返回 · 待更新</div>
      </div>
    </div>
  </div><!-- /pages-wrap -->

</div><!-- /screen-wrap -->

<div id="page-dots">
  <div class="dot active" data-page="0"></div>
  <div class="dot" data-page="1"></div>
</div>

<div id="dock">
  <div class="app-item" id="dock-chat">
    <img class="app-icon" src="https://img.icons8.com/fluency/96/chat.png" alt="">
    <div class="app-name">了了</div>
  </div>
  <div class="app-item" id="dock-home">
    <img class="app-icon" src="https://img.icons8.com/fluency/96/home-page.png" alt="">
    <div class="app-name">主页</div>
  </div>
  <div class="app-item" id="dock-settings">
    <img class="app-icon" src="https://img.icons8.com/fluency/96/settings.png" alt="">
    <div class="app-name">设置</div>
  </div>
</div>
